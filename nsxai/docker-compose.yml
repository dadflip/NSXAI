# ============================================================
# NSXAI — IA Neuro-Symbolique Explicable
# ============================================================
# Pipeline : Ontologie → HermiT (inférences OWL) → KG → GNN → Explications
#
# Services :
#   hermit   :7777   → Raisonneur OWL DL (REST)
#   gnn      (batch) → KG Builder + GNN + Explainer
#   fuseki   :3030   → Triplestore RDF (optionnel, exploration SPARQL)
#   nginx    :9000   → Accès aux ontologies en statique
# ============================================================

networks:
  nsxai:
    driver: bridge

volumes:
  gnn-output:
  fuseki-data:

services:

  # ── 1. HermiT — Raisonneur OWL DL ──────────────────────────────────────────
  hermit:
    build:
      context: ./hermit
      dockerfile: Dockerfile
    container_name: hermit
    networks: [nsxai]
    ports:
      - "7777:7777"
    volumes:
      - ./ontologies:/ontologies:ro
    environment:
      ONTOLOGY_DIR: /ontologies
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7777/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── 2. GNN — Pipeline principal (batch) ─────────────────────────────────────
  # Lance le pipeline complet et s'arrête.
  # Résultats dans ./output/ : nodes.csv, edges.csv, graph.gexf,
  #                            predictions.json, explanations.json
  gnn:
    build:
      context: .
      dockerfile: Dockerfile.gnn
    container_name: gnn
    networks: [nsxai]
    volumes:
      - ./ontologies:/ontologies:ro
      - ./output:/output
    environment:
      ONTOLOGY_DIR: /ontologies
      OUTPUT_DIR: /output
    restart: "no"
    depends_on:
      hermit:
        condition: service_healthy

  # ── 3. Fuseki — Triplestore (optionnel) ─────────────────────────────────────
  # Utile pour explorer le KG via SPARQL après le pipeline.
  # Désactivez avec : docker compose up hermit gnn
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki
    networks: [nsxai]
    ports:
      - "3030:3030"
    volumes:
      - fuseki-data:/fuseki
      - ./ontologies:/ontologies:ro
    environment:
      ADMIN_PASSWORD: ${FUSEKI_PASSWORD:-admin}
      JVM_ARGS: "-Xmx2g"
    restart: unless-stopped
    profiles: ["sparql"]   # démarré uniquement avec --profile sparql

  # ── 4. Nginx — Ontologies statiques ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    networks: [nsxai]
    ports:
      - "9000:80"
    volumes:
      - ./ontologies:/usr/share/nginx/html/ontologies:ro
    restart: unless-stopped
    profiles: ["sparql"]
