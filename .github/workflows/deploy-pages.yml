name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "public/**"
  workflow_dispatch:   # déclenchement manuel possible

permissions:
  contents: read
  pages:    write
  id-token: write

# Un seul déploiement à la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pas de build nécessaire : public/ contient des fichiers statiques
      # (OWL, TTL, PDF, images). On les sert tels quels.

      - name: Add CORS headers via _headers file (Netlify-style, ignored by GH Pages)
        run: |
          cat > public/_headers << 'EOF'
          /*
            Access-Control-Allow-Origin: *
            Access-Control-Allow-Methods: GET, OPTIONS
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Déploie uniquement le dossier public/
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
